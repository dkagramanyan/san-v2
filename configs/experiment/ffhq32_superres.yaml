# Usage:
#   python train_hydra.py +experiment=ffhq32_superres \
#       outdir=./training-runs/ffhq data=./data/ffhq32.zip \
#       path_stem=training-runs/ffhq/00000-stylegan3-r-ffhq16-gpus8-batch2048/best_model.pkl
