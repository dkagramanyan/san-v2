# Hydra config for train_hydra.py.
#
# train.py's click CLI is the single source of truth for option names and defaults;
# this file only declares the required fields. Override any other train.py flag on the
# command line using the option's Python name (underscores: batch_gpu, syn_layers,
# save_weights_only, ...), e.g.:
#
#   python train_hydra.py outdir=./runs cfg=stylegan3-r cond=true \
#       data=./datasets/imagenet_9to4_1024x1024_32x32.zip gpus=2 batch_gpu=96 \
#       superres=true up_factor=2 head_layers=7 \
#       path_stem=./runs/wc-cv_h200/00000-.../best_model.pkl

defaults:
  - _self_

# Required (no default in the CLI either -- must be provided here or on the command line).
outdir: ???        # Where to save results
cfg: ???           # Base config: stylegan3-t | stylegan3-r | stylegan2 | fastgan
data: ???          # Training data: [ZIP|DIR]
gpus: ???          # Number of GPUs
batch_gpu: ???     # Batch size per GPU (total batch = batch_gpu * gpus)

# Keep the current working directory (repo root) so relative --data/--outdir paths
# and the in_embeddings/ lookup behave exactly like the CLI.
hydra:
  job:
    chdir: false
  run:
    dir: .
